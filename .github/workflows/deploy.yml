name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          cd ~/ITProjectManagement
          git pull origin main

      - name: Rebuild and restart
        run: |
          cd ~/ITProjectManagement
          docker-compose up --build -d
          docker image prune -f
